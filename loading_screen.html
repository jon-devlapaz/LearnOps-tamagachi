<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Socratic Canvas | Initializing Intelligence</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#1c1c19",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "surface-container": "#f1ede9",
                        "primary-fixed": "#eaddff",
                        "primary-container": "#7c5fb8",
                        "on-secondary-fixed": "#230f45",
                        "tertiary-fixed-dim": "#ddc65a",

                        "error": "#ba1a1a",

                        "on-tertiary-container": "#4a3f00",
                        "tertiary": "#6d5e00",
                        "secondary-fixed-dim": "#d3bcfc",
                        "on-primary-container": "#f9f1ff",
                        "secondary-fixed": "#ebdcff",
                        "on-primary-fixed": "#25005a",
                        "on-tertiary-fixed-variant": "#524600",
                        "on-surface": "#1c1c19",
                        "inverse-on-surface": "#f4f0ec",
                        "surface-bright": "#fdf9f5",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#c0ab42",
                        "inverse-surface": "#31302e",
                        "on-secondary-fixed-variant": "#503d73",
                        "on-primary": "#ffffff",
                        "primary": "#63469d",
                        "surface-container-highest": "#e6e2de",
                        "secondary-container": "#d6beff",
                        "on-surface-variant": "#494551",
                        "surface": "#fdf9f5",
                        "surface-dim": "#ddd9d6",
                        "on-tertiary-fixed": "#211b00",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#fae373",
                        "outline-variant": "#cbc4d2",
                        "surface-tint": "#6b4ea6",
                        "on-secondary-container": "#5d4a82",
                        "inverse-primary": "#d2bbff",
                        "background": "#fdf9f5",
                        "secondary": "#68548d",
                        "surface-variant": "#e6e2de",
                        "surface-container-low": "#f7f3ef",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#ebe7e4",
                        "surface-container-lowest": "#ffffff"

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .neural-pulse-canvas {
            background: radial-gradient(circle at center, #7c5fb8 0%, transparent 70%);
            filter: blur(60px);
            opacity: 0.15;
        }
        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            background-size: 200% 100%;
        }
        .glass-blur {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary-container overflow-hidden">
<!-- Subtle Background Texture -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute inset-0 bg-[radial-gradient(#cbc4d2_1px,transparent_1px)] [background-size:32px_32px] opacity-[0.15]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] neural-pulse-canvas rounded-full"></div>
</div>
<!-- Main Loading Canvas -->
<main class="relative z-10 flex flex-col items-center justify-between h-screen w-full px-8 py-16">
<!-- Brand Anchor -->
<header class="flex flex-col items-center gap-2">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-background">Socratic Canvas</h1>
<div class="flex items-center gap-2">
<span class="h-1 w-1 rounded-full bg-primary"></span>
<span class="font-label text-xs uppercase tracking-[0.2em] text-secondary">Advanced Metacognition</span>
<span class="h-1 w-1 rounded-full bg-primary"></span>
</div>
</header>
<!-- Neural Pulse Focal Point -->
<div class="flex-1 flex flex-col items-center justify-center w-full max-w-4xl relative">
<div class="relative w-80 h-80 flex items-center justify-center">
<!-- Outer Rings (Asymmetric) -->
<div class="absolute inset-0 border-[0.5px] border-outline-variant rounded-full opacity-20 scale-110"></div>
<div class="absolute inset-4 border-[1px] border-primary-container rounded-full opacity-10 scale-90"></div>
<!-- Central Cognitive Orb -->
<div class="w-48 h-48 rounded-full bg-gradient-to-br from-primary to-primary-container shadow-2xl flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
<span class="material-symbols-outlined text-white text-6xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
<!-- Decorative Light Glares -->
<div class="absolute -top-10 -left-10 w-32 h-32 bg-white/20 blur-3xl rounded-full"></div>
</div>
<!-- Floating Data Points (Organic/Asymmetric) -->
<div class="absolute top-0 right-10 flex items-center gap-2 bg-surface-container-lowest/80 glass-blur px-4 py-2 rounded-full shadow-sm border border-white/20">
<span class="material-symbols-outlined text-primary text-sm">auto_awesome</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Synthesizing</span>
</div>
<div class="absolute bottom-10 left-0 flex items-center gap-2 bg-surface-container-lowest/80 glass-blur px-4 py-2 rounded-full shadow-sm border border-white/20">
<span class="material-symbols-outlined text-tertiary text-sm">database</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Indexing Thought</span>
</div>
</div>
<!-- Cycling Metacognition Tips -->
<div class="mt-16 text-center max-w-lg mx-auto">
<div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-secondary-container/30 mb-6">
<span class="text-[10px] font-bold uppercase tracking-tighter text-on-secondary-container">Intellectual Growth Tip</span>
</div>
<p class="font-headline text-xl md:text-2xl font-semibold leading-snug text-on-background min-h-[80px]">
                    "Spaced repetition helps you retain information up to 3x longer by timing reviews perfectly."
                </p>
<div class="mt-4 flex justify-center gap-1">
<div class="h-1 w-8 rounded-full bg-primary"></div>
<div class="h-1 w-2 rounded-full bg-outline-variant"></div>
<div class="h-1 w-2 rounded-full bg-outline-variant"></div>
</div>
</div>
</div>
<!-- Footer Progress -->
<footer class="w-full max-w-md flex flex-col items-center gap-6">
<div class="w-full flex flex-col gap-3">
<div class="flex justify-between items-end px-1">
<span class="text-[10px] font-bold uppercase tracking-[0.15em] text-secondary/60">System Ready</span>
<span class="font-headline font-bold text-sm text-primary">82%</span>
</div>
<!-- Premium Progress Bar -->
<div class="h-[6px] w-full bg-surface-container-highest rounded-full overflow-hidden p-[1px]">
<div class="h-full w-[82%] bg-gradient-to-r from-primary to-primary-container rounded-full relative">
<div class="absolute inset-0 loading-shimmer"></div>
</div>
</div>
</div>
<!-- Branding Micro-copy -->
<div class="flex items-center gap-8 text-secondary/40 font-label text-[10px] uppercase tracking-widest">
<span>Optimizing Context Windows</span>
<span class="h-1 w-1 bg-outline-variant rounded-full"></span>
<span>Neural Engine v4.2</span>
</div>
</footer>
</main>
<!-- Decorative Corner Elements -->
<div class="fixed top-8 left-8 flex flex-col gap-1 opacity-20 pointer-events-none">
<div class="w-8 h-[1px] bg-on-surface"></div>
<div class="w-[1px] h-8 bg-on-surface"></div>
</div>
<div class="fixed bottom-8 right-8 flex flex-col items-end gap-1 opacity-20 pointer-events-none">
<div class="w-8 h-[1px] bg-on-surface"></div>
<div class="w-[1px] h-8 bg-on-surface"></div>
</div>
