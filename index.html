<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <title>Theta</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>

<body>




  <!-- Backdrop (mobile only) -->
  <div id="backdrop" onclick="App.closeDrawer()"></div>

  <!-- Left sidebar -->
  <div id="drawer" data-open="false">
    <div class="sidebar-brand">
      <span class="sidebar-brand-name">tink</span>
    </div>

    <nav class="sidebar-nav">
      <a id="nav-dashboard" class="sidebar-nav-item active" href="javascript:void(0)" onclick="App.showDashboard()">Dashboard</a>
      <a id="nav-library" class="sidebar-nav-item" href="javascript:void(0)" onclick="App.showLibrary()">Library</a>
      <a id="nav-analytics" class="sidebar-nav-item" href="javascript:void(0)" style="opacity:0.5; cursor:not-allowed;" title="Analytics Module Offline">Analytics</a>
      <a id="nav-settings" class="sidebar-nav-item" href="javascript:void(0)" onclick="startSettings()">Settings</a>
    </nav>

    <div class="sidebar-divider"></div>
    <span class="sidebar-section-label">Concepts</span>

    <div id="concept-list"></div>
    <div id="add-trigger-area"></div>

    <!-- Close button (mobile only) -->
    <button class="drawer-close" onclick="App.closeDrawer()">×</button>
  </div>

  <!-- Main content -->
  <div id="card">

    <!-- Header bar (desktop) -->
    <header class="main-header">
      <div class="main-header-left">
        <button class="drawer-toggle" onclick="App.toggleDrawer()" title="Menu">☰</button>
        <span class="main-header-title">tinkboard</span>
      </div>
      <button class="dev-skip" id="dev-btn" style="display:none;" onclick="App.fastForward()">[skip 24h]</button>
    </header>

    <!-- Hero card: concept info left, crystal grid right -->
    <section class="hero-card">

      <div class="hero-info" id="hero-info">
        <div class="concept-label" id="concept-label"></div>
        <h2 id="title">tink</h2>
        <p class="desc" id="desc">Add a tink to begin your growth.</p>
        <div id="timer-display">24:00:00</div>
      </div>

      <div class="drill-ui" id="drill-ui" style="display:none;">
        <div class="drill-header">
          <button class="drill-back" onclick="App.cancelDrill()">← Back</button>
          <span class="drill-title" id="drill-title">Drill Session</span>
        </div>
        <div class="chat-history" id="chat-history"></div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chat-input" placeholder="Explain this concept in your own words..." rows="2"></textarea>
        </div>
      </div>

      <!-- 2×2 isometric crystal grid -->
      <div id="grid-container" style="position:relative; padding-top:28px; overflow:visible;">
        <!-- Floating Consolidate Button (appears dynamically after successful drill) -->
        <button id="btn-consolidate-float" class="btn-consolidate-float" onclick="App.consolidate()" style="display:none;" title="Consolidate to long-term memory (Hibernation)">
          <svg style="display: block; width: 16px; height: 16px; flex-shrink: 0; stroke: #ffffff; fill: none; pointer-events: none;" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>

        <svg id="grid-svg" viewBox="0 0 280 220" width="280" height="220" xmlns="http://www.w3.org/2000/svg"
          style="overflow:visible;">
          <defs>
            <filter id="glow-filter" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <!-- Paint order: back → front. Transforms are fixed. Content populated by renderGrid(). -->
          <g id="tile-0" class="tile-group" transform="translate(70,45)" onclick="App.selectTile(0)"></g>
          <g id="tile-1" class="tile-group" transform="translate(0,85)" onclick="App.selectTile(1)"></g>
          <g id="tile-2" class="tile-group" transform="translate(140,85)" onclick="App.selectTile(2)"></g>
          <g id="tile-3" class="tile-group" transform="translate(70,125)" onclick="App.selectTile(3)"></g>
        </svg>
        <div id="tile-tooltip"></div>
      </div>

    </section>

    <!-- Library View Panel -->
    <section id="library-view" class="library-view">
      <button class="map-close-btn" onclick="App.hideLibrary()" aria-label="Close library">×</button>
      <h2 class="library-heading">Library</h2>
      <div id="library-content"></div>
    </section>

    <!-- Map View Panel -->
    <section id="map-view" class="map-view">
      <button class="map-close-btn" onclick="App.hideMapView()" aria-label="Close map">×</button>
      <div id="map-content"></div>
    </section>

  </div>

  <!-- PDF.js for robust client-side extraction -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script src="ai_service.js"></script>
  <script src="app.js"></script>


  <!-- Cross-Page Router -->
  <a id="mode-toggle" href="stitch/code.html"
    style="text-decoration:none; display:inline-flex; align-items:center; gap:6px; position:fixed; bottom:24px; right:24px; z-index:2000; background:var(--primary); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:10px 18px; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; font-weight:800; color:white; box-shadow:0 6px 16px rgba(124,111,205,0.4); transition:all 0.3s cubic-bezier(0.2,0.8,0.2,1);"
    onmouseover="this.style.transform='translateY(-2px) scale(1.02)'; this.style.boxShadow='0 8px 24px rgba(124,111,205,0.6)'; this.style.color='white';"
    onmouseout="this.style.transform='none'; this.style.boxShadow='0 6px 16px rgba(124,111,205,0.4)';">
    Ops Mode
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 12h14" />
      <path d="m12 5 7 7-7 7" />
    </svg>
  </a>
</body>

</html>
